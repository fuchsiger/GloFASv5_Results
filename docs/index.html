<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GloFASv5 · Calibration Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0b0e14;
    --surface: #131720;
    --border: #1e2535;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --text: #e2e8f0;
    --muted: #64748b;
    --excellent: #22c55e;
    --good: #84cc16;
    --fair: #eab308;
    --poor: #f97316;
    --bad: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }
  .header-title { flex: 1; min-width: 260px; }
  .header-title h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header-title h1 span { color: var(--accent2); }
  .header-title p { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .stats-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: #fff; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .controls {
    padding: 14px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px 7px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .count-badge { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
  .count-badge span { color: var(--text); }

  .legend {
    padding: 8px 32px;
    display: flex;
    gap: 16px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .legend-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .table-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 230px); }

  table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  thead { position: sticky; top: 0; z-index: 10; }
  thead th {
    background: var(--surface);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-size: 10px;
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent2); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(59,130,246,0.05); }

  td { padding: 9px 14px; vertical-align: middle; white-space: nowrap; }

  .station-name { font-weight: 500; color: var(--text); max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
  .cell-muted { color: var(--muted); font-size: 11px; }
  .cell-basin { color: var(--accent2); font-size: 11px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

  .kge-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }
  .kge-chip.excellent { background: rgba(34,197,94,0.12);  color: var(--excellent); }
  .kge-chip.good      { background: rgba(132,204,22,0.12); color: var(--good); }
  .kge-chip.fair      { background: rgba(234,179,8,0.12);  color: var(--fair); }
  .kge-chip.poor      { background: rgba(249,115,22,0.12); color: var(--poor); }
  .kge-chip.bad       { background: rgba(239,68,68,0.12);  color: var(--bad); }

  .sparkline-cell { width: 120px; min-width: 120px; }
  canvas.spark { display: block; }

  .status-msg { padding: 60px 32px; text-align: center; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .status-msg .loader {
    display: inline-block; width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--bad); }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>GloFAS<span>v5</span> · Calibration Results</h1>
    <p>modKGE (JSD-KGE) · Global station performance overview</p>
  </div>
  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total Stations</div></div>
    <div class="stat"><div class="stat-val" id="statCalib">—</div><div class="stat-lbl">Calibrated</div></div>
    <div class="stat"><div class="stat-val" id="statExcellent">—</div><div class="stat-lbl">KGE ≥ 0.75</div></div>
    <div class="stat"><div class="stat-val" id="statGood">—</div><div class="stat-lbl">KGE 0.5–0.75</div></div>
    <div class="stat"><div class="stat-val" id="statPoor">—</div><div class="stat-lbl">KGE &lt; 0.5</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search station, basin, country…">
  </div>
  <span class="filter-label">KGE Filter</span>
  <select id="kgeFilter">
    <option value="all">All</option>
    <option value="excellent">Excellent (≥ 0.75)</option>
    <option value="good">Good (0.5 – 0.75)</option>
    <option value="fair">Fair (0.25 – 0.5)</option>
    <option value="poor">Poor (0 – 0.25)</option>
    <option value="bad">Bad (&lt; 0)</option>
  </select>
  <span class="filter-label">Sort by</span>
  <select id="sortSelect">
    <option value="kge_desc">KGE ↓</option>
    <option value="kge_asc">KGE ↑</option>
    <option value="name_asc">Name A–Z</option>
    <option value="country_asc">Country</option>
  </select>
  <div class="count-badge">Showing <span id="shownCount">—</span> / <span id="totalCount">—</span></div>
</div>

<div class="legend">
  <span class="legend-lbl">KGE</span>
  <div class="legend-item"><div class="legend-dot" style="background:var(--excellent)"></div>Excellent ≥ 0.75</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--good)"></div>Good 0.5–0.75</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--fair)"></div>Fair 0.25–0.5</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--poor)"></div>Poor 0–0.25</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bad)"></div>Bad &lt; 0</div>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="status-msg" id="statusMsg">
    <div class="loader"></div><br>Loading CSV from GitHub…
  </div>
  <table id="mainTable" style="display:none">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/fuchsiger/GloFASv5_Results/refs/heads/main/GloFASv5_Calibration_Results_updated.csv';
const PAGE_SIZE = 200;

let allRows = [];
let filtered = [];
let sortKey = 'kge_desc';
let currentPage = 0;
let loading = false;

// Column indices
let kgeCol = -1, nameCol = -1, idCol = -1, countryCol = -1;
let latCol = -1, lonCol = -1, basinCol = -1;
let headers = [];

// ── CSV parser ───────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n');
  const result = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const row = [];
    let inQ = false, cur = '';
    for (let j = 0; j < line.length; j++) {
      const c = line[j];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    row.push(cur.trim());
    result.push(row);
  }
  return result;
}

// ── Column detection ─────────────────────────────────────────────────
function detectCols(hdrs) {
  const exact = (name) => hdrs.findIndex(h => h === name);
  const fuzzy = (patterns) => {
    for (const p of patterns) {
      const idx = hdrs.findIndex(h => h.toLowerCase().includes(p));
      if (idx >= 0) return idx;
    }
    return -1;
  };
  kgeCol     = exact('modKGE_v5');
  nameCol    = exact('name');
  idCol      = exact('efas');
  countryCol = exact('iso');
  latCol     = exact('lat_x');
  lonCol     = exact('long');
  basinCol   = exact('basin');

  if (kgeCol < 0)     kgeCol     = fuzzy(['modkge', 'kge']);
  if (nameCol < 0)    nameCol    = fuzzy(['name', 'station']);
  if (idCol < 0)      idCol      = fuzzy(['efas', 'id']);
  if (countryCol < 0) countryCol = fuzzy(['iso', 'country']);
  if (latCol < 0)     latCol     = fuzzy(['lat_x', 'lat']);
  if (lonCol < 0)     lonCol     = fuzzy(['long', 'lon']);
  if (basinCol < 0)   basinCol   = fuzzy(['basin']);
}

// ── KGE classification ───────────────────────────────────────────────
function kgeClass(v) {
  if (v === null || isNaN(v)) return 'bad';
  if (v >= 0.75) return 'excellent';
  if (v >= 0.50) return 'good';
  if (v >= 0.25) return 'fair';
  if (v >= 0.00) return 'poor';
  return 'bad';
}

// ── Sparkline ────────────────────────────────────────────────────────
function drawSparkline(canvas, kgeVal) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e2535';
  ctx.beginPath(); ctx.roundRect(0, H/2 - 3, W, 6, 3); ctx.fill();
  if (kgeVal === null || isNaN(kgeVal)) return;
  const clipped = Math.max(-1, Math.min(1, kgeVal));
  const zeroX = W * 0.5;
  const valX  = W * (clipped + 1) / 2;
  const colors = { excellent: '#22c55e', good: '#84cc16', fair: '#eab308', poor: '#f97316', bad: '#ef4444' };
  ctx.fillStyle = colors[kgeClass(kgeVal)];
  const x1 = Math.min(zeroX, valX), x2 = Math.max(zeroX, valX);
  ctx.beginPath(); ctx.roundRect(x1, H/2 - 3, Math.max(x2 - x1, 2), 6, 2); ctx.fill();
  ctx.fillStyle = '#334155';
  ctx.fillRect(zeroX - 0.5, H/2 - 6, 1, 12);
  ctx.fillStyle = colors[kgeClass(kgeVal)];
  ctx.beginPath(); ctx.arc(valX, H/2, 4, 0, Math.PI * 2); ctx.fill();
}

// ── Table header ─────────────────────────────────────────────────────
function buildHeader() {
  const thead = document.getElementById('tableHead');
  const cols = [
    { label: '#',          key: null },
    { label: 'EFAS ID',    key: 'id' },
    { label: 'Station',    key: 'name' },
    { label: 'Basin',      key: null },
    { label: 'ISO',        key: 'country' },
    { label: 'Lat',        key: null },
    { label: 'Lon',        key: null },
    { label: 'modKGE v5',  key: 'kge' },
    { label: 'Performance',key: null },
  ];
  const tr = document.createElement('tr');
  cols.forEach(c => {
    const th = document.createElement('th');
    if (c.key) {
      th.innerHTML = `${c.label} <span class="sort-icon">↕</span>`;
      th.addEventListener('click', () => {
        sortKey = (sortKey === `${c.key}_desc`) ? `${c.key}_asc` : `${c.key}_desc`;
        applyFilters();
      });
    } else {
      th.textContent = c.label;
    }
    tr.appendChild(th);
  });
  thead.appendChild(tr);
}

// ── Render rows ──────────────────────────────────────────────────────
function renderRows(rows, append = false) {
  const tbody = document.getElementById('tableBody');
  if (!append) tbody.innerHTML = '';
  const frag = document.createDocumentFragment();

  rows.forEach((row, i) => {
    const kgeVal  = kgeCol >= 0     ? parseFloat(row[kgeCol])  : NaN;
    const cls     = kgeClass(kgeVal);
    const name    = nameCol >= 0    ? row[nameCol]   : '—';
    const id      = idCol >= 0      ? row[idCol]     : '—';
    const country = countryCol >= 0 ? row[countryCol]: '—';
    const basin   = basinCol >= 0   ? row[basinCol]  : '—';
    const lat     = latCol >= 0     ? parseFloat(row[latCol])  : NaN;
    const lon     = lonCol >= 0     ? parseFloat(row[lonCol])  : NaN;

    const tr = document.createElement('tr');
    const cell = (text, className) => {
      const td = document.createElement('td');
      td.className = className || '';
      td.textContent = text;
      td.title = text;
      tr.appendChild(td);
      return td;
    };

    cell((currentPage * PAGE_SIZE + i + 1).toString().padStart(4,'0'), 'cell-muted');
    cell(id,     'cell-muted');
    cell(name,   'station-name');
    cell(basin,  'cell-basin');
    cell(country,'cell-muted');
    cell(isNaN(lat) ? '—' : lat.toFixed(3), 'cell-muted');
    cell(isNaN(lon) ? '—' : lon.toFixed(3), 'cell-muted');

    // KGE chip
    const tdKge = document.createElement('td');
    tdKge.innerHTML = `<span class="kge-chip ${cls}">${isNaN(kgeVal) ? '—' : kgeVal.toFixed(3)}</span>`;
    tr.appendChild(tdKge);

    // Sparkline
    const tdSpark = document.createElement('td');
    tdSpark.className = 'sparkline-cell';
    const canvas = document.createElement('canvas');
    canvas.width = 120; canvas.height = 24;
    canvas.className = 'spark';
    tdSpark.appendChild(canvas);
    tr.appendChild(tdSpark);
    frag.appendChild(tr);
    requestAnimationFrame(() => drawSparkline(canvas, kgeVal));
  });

  tbody.appendChild(frag);
}

// ── Filter + Sort ────────────────────────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const kgeF = document.getElementById('kgeFilter').value;
  sortKey    = document.getElementById('sortSelect').value;

  filtered = allRows.filter(row => {
    if (q && !row.join(' ').toLowerCase().includes(q)) return false;
    if (kgeF !== 'all') {
      const v = kgeCol >= 0 ? parseFloat(row[kgeCol]) : NaN;
      if (kgeClass(v) !== kgeF) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    const av = kgeCol >= 0 ? parseFloat(a[kgeCol]) : NaN;
    const bv = kgeCol >= 0 ? parseFloat(b[kgeCol]) : NaN;
    const an = nameCol >= 0    ? a[nameCol]    : '';
    const bn = nameCol >= 0    ? b[nameCol]    : '';
    const ac = countryCol >= 0 ? a[countryCol] : '';
    const bc = countryCol >= 0 ? b[countryCol] : '';
    switch (sortKey) {
      case 'kge_desc':     return (isNaN(bv) ? -Infinity : bv) - (isNaN(av) ? -Infinity : av);
      case 'kge_asc':      return (isNaN(av) ?  Infinity : av) - (isNaN(bv) ?  Infinity : bv);
      case 'name_asc':     return an.localeCompare(bn);
      case 'country_asc':  return ac.localeCompare(bc);
      default: return 0;
    }
  });

  currentPage = 0;
  document.getElementById('shownCount').textContent = Math.min(PAGE_SIZE, filtered.length);
  document.getElementById('totalCount').textContent  = filtered.length;
  renderRows(filtered.slice(0, PAGE_SIZE));
  setupInfiniteScroll();
}

// ── Infinite scroll ──────────────────────────────────────────────────
function setupInfiniteScroll() {
  const wrap = document.getElementById('tableWrap');
  wrap.onscroll = () => {
    if (loading) return;
    if (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 200) {
      const nextStart = (currentPage + 1) * PAGE_SIZE;
      if (nextStart >= filtered.length) return;
      loading = true;
      currentPage++;
      renderRows(filtered.slice(nextStart, nextStart + PAGE_SIZE), true);
      document.getElementById('shownCount').textContent = Math.min((currentPage + 1) * PAGE_SIZE, filtered.length);
      loading = false;
    }
  };
}

// ── Summary stats ────────────────────────────────────────────────────
function updateStats(rows) {
  let excellent = 0, good = 0, poor = 0;
  rows.forEach(r => {
    const v = kgeCol >= 0 ? parseFloat(r[kgeCol]) : NaN;
    if (isNaN(v)) return;
    if (v >= 0.75) excellent++;
    else if (v >= 0.5) good++;
    else poor++;
  });
  document.getElementById('statTotal').textContent = rows.length.toLocaleString();
  document.getElementById('statCalib').textContent = (excellent + good + poor).toLocaleString();
  document.getElementById('statExcellent').textContent = excellent.toLocaleString();
  document.getElementById('statGood').textContent      = good.toLocaleString();
  document.getElementById('statPoor').textContent      = poor.toLocaleString();
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ── Main ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status} – ${res.statusText}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('CSV appears empty');

    headers = rows[0];
    allRows = rows.slice(1).filter(r => r.length > 1);

    detectCols(headers);
    buildHeader();
    updateStats(allRows);

    document.getElementById('statusMsg').style.display = 'none';
    document.getElementById('mainTable').style.display = '';

    applyFilters();

    document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 200));
    document.getElementById('kgeFilter').addEventListener('change', applyFilters);
    document.getElementById('sortSelect').addEventListener('change', applyFilters);

  } catch (err) {
    document.getElementById('statusMsg').innerHTML =
      `<span class="error-msg">⚠ Could not load CSV<br><small>${err.message}</small><br><br>` +
      `<small>URL: ${CSV_URL}</small></span>`;
  }
}

loadData();
</script>
</body>
</html>
